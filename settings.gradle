pluginManagement {
    repositories {
        mavenCentral()
        maven {
            name = "papermc"
            url = uri("https://repo.papermc.io/repository/maven-public/")
        }
        gradlePluginPortal()
    }
    
    plugins {
        // enables hotswapping
        id("org.gradle.toolchains.foojay-resolver-convention") version "0.9.0"
    }
}

rootProject.name = 'imprisoned'

include("api", "server", "client")